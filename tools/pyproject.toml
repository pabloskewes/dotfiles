[project]
name = "psk"
version = "0.1.0"
description = "Personal automation tools"
requires-python = ">=3.11"
dependencies = ["typer>=0.15.1"]

[project.scripts]
worktree-create = "psk.cli:worktree_create_app"
worktree-remove = "psk.cli:worktree_remove_app"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
