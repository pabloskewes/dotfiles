[project]
name = "psk"
version = "0.1.0"
description = "Personal automation tools"
requires-python = ">=3.11"
dependencies = ["typer>=0.15.1"]

[project.scripts]
worktree = "psk.cli:main"
scopeo-ticket-init = "psk.cli:main_scopeo_ticket_init"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
